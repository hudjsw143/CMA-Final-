<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMA Final Strategic Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        accent: { 500: '#8b5cf6', 600: '#7c3aed' }
                    },
                    boxShadow: {
                        'glow': '0 0 15px -3px rgba(139, 92, 246, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 0.75rem 1rem;
            text-align: left;
        }
        th {
            background-color: #f8fafc;
            font-weight: 700;
            color: #0f172a;
        }
        tr:nth-child(even) {
            background-color: #f1f5f9;
        }
        .dark th, .dark td {
            border-color: #475569;
        }
        .dark th {
            background-color: #1e293b;
            color: #f1f5f9;
        }
        .dark tr:nth-child(even) {
            background-color: #0f172a;
        }
        .dark tr:nth-child(odd) {
            background-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-20 transition-colors">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">CMA Strategic Preparation</h1>
            </div>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Toggle Dark Mode">
                <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8 relative">
        <div class="mb-8 flex items-center justify-between min-h-[40px]">
            <h2 id="step-title" class="text-3xl font-bold tracking-tight text-slate-800 dark:text-slate-100">Loading...</h2>
            <button id="btn-back" class="hidden px-4 py-2 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 shadow-sm border border-transparent dark:border-slate-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back
            </button>
        </div>
        <div id="content-container" class="fade-in"></div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-6 text-center text-sm font-medium text-slate-400 dark:text-slate-500 select-none">
        &bull; Keep Studying 📙 &bull; Made By Bipin ❤️
    </footer>

    <script>
        let questionData = [];
        let currentState = {
            level: 0,
            group: null,
            paper: null,
            module: null,
            topic: null,
            year: null
        };

        function pushStateAndRender() {
            history.pushState(JSON.parse(JSON.stringify(currentState)), "", "");
            render();
        }

        window.addEventListener('popstate', (event) => {
            if (event.state) {
                currentState = event.state;
                render();
            } else {
                currentState.level = 0;
                render();
            }
        });

        const container = document.getElementById('content-container');
        const titleEl = document.getElementById('step-title');
        const backBtn = document.getElementById('btn-back');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        async function loadData() {
            try {
                let fileList = [];
                try {
                    const indexRes = await fetch('data/index.json');
                    if (indexRes.ok) {
                        const indexData = await indexRes.json();
                        fileList = indexData.map(file => `data/${file}`);
                    } else throw new Error('No index');
                } catch (e) {
                    fileList = [
                        "data/paper16_dec2025.json",
                        "data/paper16_june2025.json",
                        "data/paper16_dec2024.json",
                        "data/paper16_june2024.json",
                        "data/paper16_dec2023.json",
                        "data/paper14_dec2023.json",
                        "data/paper14_june2024.json",
                        "data/paper14_dec2024.json",
                        "data/paper14_june2025.json",
                        "data/paper14_dec2025.json",
                        "data/paper13.json"
                    ];
                }

                const fetchPromises = fileList.map(async (file) => {
                    try {
                        const response = await fetch(file);
                        if (!response.ok) return [];
                        return await response.json();
                    } catch (error) {
                        console.warn(`Skipped missing file: ${file}`);
                        return [];
                    }
                });

                const allDatasets = await Promise.all(fetchPromises);
                questionData = allDatasets.flat();

                if (questionData.length === 0) {
                    throw new Error("No data loaded. Check /data/ folder files.");
                }
            } catch (error) {
                renderError(error.message);
                throw error;
            }
        }

        function renderError(msg) {
            titleEl.textContent = "System Error";
            container.className = "fade-in";
            container.innerHTML = `
                <div class="p-6 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 rounded-2xl border border-red-200 dark:border-red-800/50 shadow-sm">
                    <h3 class="font-bold text-lg mb-2">Error Loading Data</h3>
                    <p>${msg}</p>
                    <ul class="list-disc pl-5 mt-4 text-sm opacity-80">
                        <li>Ensure you are running a local server (e.g., VS Code Live Server).</li>
                        <li>Verify the /data/ folder exists.</li>
                    </ul>
                </div>`;
        }

        function render() {
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            container.innerHTML = '';
            backBtn.classList.toggle('hidden', currentState.level === 0);

            switch(currentState.level) {
                case 0: renderGroups(); break;
                case 1: renderPapers(); break;
                case 2: renderDashboard(); break;
                case 3: renderModules(); break;
                case 4: renderTopics(); break;
                case 5: renderYears(); break;
                case 6: renderQuestions(); break;
                case 10: renderABCAnalysis(); break;
                case 11: renderABCTopicQuestions(); break;
            }
        }

        function renderGroups() {
            titleEl.textContent = "Select Group";
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            ["Group 3", "Group 4"].forEach(group => {
                container.appendChild(createCard(group, "View Papers →", () => {
                    currentState.group = group;
                    currentState.level = 1;
                    pushStateAndRender();
                }));
            });
        }

        function renderPapers() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.group} /</span>Papers`;
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            
            if (currentState.group === "Group 3") {
                ["Paper 13", "Paper 14", "Paper 15", "Paper 16"].forEach(paper => {
                    container.appendChild(createCard(paper, "Open Dashboard →", () => {
                        currentState.paper = paper;
                        currentState.level = 2;
                        pushStateAndRender();
                    }, true));
                });
            } else {
                container.innerHTML = `<div class="col-span-full p-8 text-center bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm"><p class="text-slate-500">Contents coming soon.</p></div>`;
            }
        }

        function renderDashboard() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.paper} /</span>Dashboard`;
            container.className = "flex flex-col gap-8";

            const paperData = questionData.filter(q => q.paper === currentState.paper);
            const totalQs = paperData.length;
            const uniqueTopics = new Set(paperData.map(q => q.topic)).size;
            const uniqueModules = new Set(paperData.map(q => q.module)).size;

            container.innerHTML = `
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${totalQs}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Questions</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${uniqueTopics}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Topics</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${uniqueModules}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Modules</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div onclick="navigateStudyMode()" class="group relative bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl hover:border-brand-500 cursor-pointer transition-all overflow-hidden flex flex-col justify-between min-h-[220px]">
                        <div class="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-20 transition-opacity">
                            <svg class="w-24 h-24 text-brand-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z"/><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/></svg>
                        </div>
                        <div class="z-10">
                            <div class="inline-block px-3 py-1 bg-slate-100 dark:bg-slate-700 rounded-full text-xs font-bold tracking-wider text-slate-600 dark:text-slate-300 mb-4">Traditional Flow</div>
                            <h3 class="text-3xl font-bold text-slate-900 dark:text-white mb-2 group-hover:text-brand-600 transition-colors">Study Mode</h3>
                            <p class="text-slate-500 dark:text-slate-400 font-medium">Browse questions module-wise.</p>
                        </div>
                        <div class="z-10 mt-6 flex items-center text-brand-600 dark:text-brand-400 font-bold text-sm">
                            Begin Revision <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>

                    <div onclick="navigateABCMode()" class="group relative bg-slate-900 dark:bg-slate-800 p-8 rounded-3xl border-2 border-transparent hover:border-accent-500 shadow-lg hover:shadow-glow cursor-pointer transition-all overflow-hidden flex flex-col justify-between min-h-[220px]">
                        <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-800 dark:from-slate-800 dark:to-slate-900 opacity-90"></div>
                        <div class="absolute top-0 right-0 w-32 h-32 bg-accent-500/20 rounded-full blur-3xl group-hover:bg-accent-500/30 transition-colors"></div>
                        
                        <div class="z-10 relative">
                            <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-accent-500/20 border border-accent-500/30 rounded-full text-xs font-bold tracking-wider text-accent-300 mb-4">
                                <span class="w-2 h-2 rounded-full bg-accent-400 animate-pulse"></span> Strategic
                            </div>
                            <h3 class="text-3xl font-bold text-white mb-2 group-hover:text-accent-300 transition-colors">ABC Analysis</h3>
                            <p class="text-slate-400 font-medium">What should I study first?</p>
                        </div>
                        <div class="z-10 relative mt-6 flex items-center text-accent-400 font-bold text-sm">
                            View Priorities <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                </div>
            `;
        }

        window.navigateStudyMode = () => { currentState.level = 3; pushStateAndRender(); }
        window.navigateABCMode = () => { currentState.level = 10; pushStateAndRender(); }

        function formatQuestionText(text) {
            if (!text) return '';
            if (text.includes('<table')) return `<div class="overflow-x-auto mb-6">${text}</div>`;

            const lines = text.split('\n');
            let htmlOut = '';
            let inTable = false;
            let tableRows = [];

            const escapeHTML = (str) => str.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.includes('|')) {
                    inTable = true;
                    tableRows.push(escapeHTML(line));
                } else {
                    if (inTable) {
                        htmlOut += convertPipeTableToHTML(tableRows);
                        inTable = false;
                        tableRows = [];
                    }
                    if (line) htmlOut += `<p class="mb-3 whitespace-pre-wrap">${escapeHTML(line)}</p>`;
                }
            }
            if (inTable && tableRows.length > 0) htmlOut += convertPipeTableToHTML(tableRows);
            return htmlOut;
        }

        function convertPipeTableToHTML(rows) {
            if (!rows || rows.length === 0) return '';
            let html = '<div class="overflow-x-auto mb-6"><table class="w-full text-left border-collapse">';
            rows.forEach((row, index) => {
                const isHeader = index === 0;
                const tag = isHeader ? 'th' : 'td';
                let cells = row.split('|');
                if(cells.length > 0 && cells[0].trim() === '') cells.shift();
                if(cells.length > 0 && cells[cells.length-1].trim() === '') cells.pop();
                html += '<tr>';
                cells.forEach(cell => {
                    html += `<${tag} class="border border-slate-300 dark:border-slate-600 px-4 py-3 font-medium align-top">${cell.trim()}</${tag}>`;
                });
                html += '</tr>';
            });
            html += '</table></div>';
            return html;
        }

        function renderModules() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">Study /</span>Modules`;
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            const pData = questionData.filter(q => q.paper === currentState.paper);
            
            if (pData.length === 0) {
                container.innerHTML = `<div class="col-span-full p-4 text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">No data found for this paper yet.</div>`;
                return;
            }

            [...new Set(pData.map(q => q.module))].sort((a,b) => a.localeCompare(b, undefined, {numeric: true})).forEach(mod => {
                const count = pData.filter(q => q.module === mod).length;
                container.appendChild(createCard(mod, `${count} Questions`, () => {
                    currentState.module = mod; currentState.level = 4; pushStateAndRender();
                }));
            });
        }

        function renderTopics() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.module} /</span>Topics`;
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            const mData = questionData.filter(q => q.paper === currentState.paper && q.module === currentState.module);
            [...new Set(mData.map(q => q.topic))].forEach(topic => {
                const count = mData.filter(q => q.topic === topic).length;
                container.appendChild(createCard(topic, `${count} Questions`, () => {
                    currentState.topic = topic; currentState.level = 5; pushStateAndRender();
                }));
            });
        }

        function renderYears() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.topic} /</span>Terms`;
            container.className = "grid grid-cols-2 sm:grid-cols-4 gap-4";
            const tData = questionData.filter(q => q.paper === currentState.paper && q.topic === currentState.topic);
            const sortedYears = [...new Set(tData.map(q => q.year))].sort((a,b) => parseYearTerm(b) - parseYearTerm(a));
            
            sortedYears.forEach(year => {
                const count = tData.filter(q => q.year === year).length;
                container.appendChild(createCard(year, `${count} Qs`, () => {
                    currentState.year = year; currentState.level = 6; pushStateAndRender();
                }));
            });
        }

        function renderQuestions() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.year} /</span>Practice`;
            container.className = "flex flex-col gap-6";
            const finalData = questionData.filter(q => q.paper === currentState.paper && q.topic === currentState.topic && q.year === currentState.year);

            finalData.forEach(q => {
                const qCard = document.createElement('div');
                qCard.className = "bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden";
                const badgeColor = q.type === 'Practical' ? 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300 border-blue-200 dark:border-blue-800' 
                                 : q.type === 'Case Study' ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300 border-purple-200 dark:border-purple-800'
                                 : 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800';
                
                qCard.innerHTML = `
                    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center">
                        <div class="font-bold text-slate-800 dark:text-slate-200">${q.question_no}</div>
                        <span class="px-3 py-1 rounded-md text-xs font-bold border ${badgeColor}">${q.type}</span>
                    </div>
                    <div class="p-6">
                        <div class="text-slate-800 dark:text-slate-200 text-lg leading-relaxed">
                            ${formatQuestionText(q.question)}
                        </div>
                    </div>
                `;
                container.appendChild(qCard);
            });
        }

        function renderABCAnalysis() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.paper} /</span>ABC Analysis`;
            container.className = "flex flex-col gap-6";

            const paperData = questionData.filter(q => q.paper === currentState.paper);
            const abcData = calculateABC(paperData);

            container.innerHTML = `
                <div class="inline-flex items-center gap-2 px-4 py-2 self-start bg-accent-50 dark:bg-accent-900/20 border border-accent-200 dark:border-accent-800/50 rounded-xl text-sm font-semibold text-accent-700 dark:text-accent-300 shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Based on Section B descriptive questions
                </div>
                
                <div id="abc-a" class="flex flex-col gap-4 mt-2">
                    <h3 class="text-xl font-black text-red-600 dark:text-red-400 flex items-center gap-2"><span class="bg-red-100 dark:bg-red-900/50 px-2 py-1 rounded text-sm">A</span> High Priority</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 container-a"></div>
                </div>
                <div id="abc-b" class="flex flex-col gap-4 mt-4">
                    <h3 class="text-xl font-black text-amber-600 dark:text-amber-400 flex items-center gap-2"><span class="bg-amber-100 dark:bg-amber-900/50 px-2 py-1 rounded text-sm">B</span> Medium Priority</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 container-b"></div>
                </div>
                <div id="abc-c" class="flex flex-col gap-4 mt-4">
                    <h3 class="text-xl font-black text-emerald-600 dark:text-emerald-400 flex items-center gap-2"><span class="bg-emerald-100 dark:bg-emerald-900/50 px-2 py-1 rounded text-sm">C</span> Low Priority</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 container-c"></div>
                </div>
            `;

            const containerA = document.querySelector('.container-a');
            const containerB = document.querySelector('.container-b');
            const containerC = document.querySelector('.container-c');

            if (abcData.length === 0) {
                containerA.innerHTML = `<div class="col-span-full p-4 text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">No Section B data found for this paper.</div>`;
                return;
            }

            abcData.forEach(topic => {
                let borderClass = topic.category === 'A' ? 'border-red-200 dark:border-red-900/50 hover:border-red-400' :
                                  topic.category === 'B' ? 'border-amber-200 dark:border-amber-900/50 hover:border-amber-400' :
                                                           'border-emerald-200 dark:border-emerald-900/50 hover:border-emerald-400';
                let badgeBg = topic.category === 'A' ? 'bg-red-500' : topic.category === 'B' ? 'bg-amber-500' : 'bg-emerald-500';
                
                const card = document.createElement('div');
                card.className = `group cursor-pointer bg-white dark:bg-slate-800 p-5 rounded-2xl border-2 ${borderClass} shadow-sm hover:shadow-md hover:-translate-y-1 transform transition-all`;
                card.onclick = () => {
                    currentState.topic = topic.name;
                    currentState.level = 11;
                    pushStateAndRender();
                };

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-lg text-slate-800 dark:text-slate-100 leading-tight">${topic.name}</h4>
                        <div class="flex flex-col items-end gap-1">
                            <span class="text-[11px] font-black text-white ${badgeBg} px-2 py-0.5 rounded shadow-sm tracking-widest">GRADE ${topic.category}</span>
                            <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500">Score: ${topic.score}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-y-2 text-sm text-slate-600 dark:text-slate-400">
                        <div><span class="font-medium text-slate-400 dark:text-slate-500">Sec B Appears:</span> <span class="text-slate-800 dark:text-slate-200 font-semibold">${topic.sectionBAppearances}</span></div>
                        <div><span class="font-medium text-slate-400 dark:text-slate-500">Last Seen:</span> <span class="text-slate-800 dark:text-slate-200 font-semibold">${topic.lastSeen}</span></div>
                        <div class="col-span-2"><span class="font-medium text-slate-400 dark:text-slate-500">Module:</span> ${topic.module}</div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center text-accent-600 dark:text-accent-400 font-bold text-sm">
                        <span>View ${topic.sectionBAppearances} Questions</span>
                        <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                `;
                
                if (topic.category === 'A') containerA.appendChild(card);
                else if (topic.category === 'B') containerB.appendChild(card);
                else containerC.appendChild(card);
            });
        }

        function renderABCTopicQuestions() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">ABC Analysis /</span>${currentState.topic}`;
            container.className = "flex flex-col gap-6";

            const finalData = questionData.filter(q => 
                q.paper === currentState.paper && 
                q.topic === currentState.topic && 
                q.section === 'B'
            ).sort((a,b) => parseYearTerm(b.year) - parseYearTerm(a.year));

            if (finalData.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-slate-500 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">No descriptive questions found for this topic.</div>`;
                return;
            }

            finalData.forEach(q => {
                const qCard = document.createElement('div');
                qCard.className = "bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden";
                const badgeColor = q.type === 'Practical' ? 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300 border-blue-200 dark:border-blue-800' 
                                 : q.type === 'Case Study' ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300 border-purple-200 dark:border-purple-800'
                                 : 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800';
                
                qCard.innerHTML = `
                    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="font-black tracking-wide text-brand-600 dark:text-brand-400">${q.year}</span>
                            <span class="font-bold text-slate-800 dark:text-slate-200 text-sm px-2.5 py-1 bg-white dark:bg-slate-700 rounded shadow-sm border border-slate-200 dark:border-slate-600">${q.question_no}</span>
                        </div>
                        <span class="px-3 py-1 rounded-md text-xs font-bold border ${badgeColor}">${q.type}</span>
                    </div>
                    <div class="p-6">
                        <div class="text-slate-800 dark:text-slate-200 text-lg leading-relaxed">
                            ${formatQuestionText(q.question)}
                        </div>
                    </div>
                `;
                container.appendChild(qCard);
            });
        }

        function calculateABC(data) {
            const stats = {};
            let totalSecBQs = 0;
            const maxTerm = Math.max(...data.map(q => parseYearTerm(q.year)));

            data.forEach(q => {
                if (!stats[q.topic]) {
                    stats[q.topic] = { 
                        name: q.topic, 
                        module: q.module,
                        totalAppearances: 0, 
                        sectionBAppearances: 0,
                        recentAppearances: 0, 
                        caseStudyBonus: 0, 
                        yearsB: [] 
                    };
                }
                let t = stats[q.topic];
                
                t.totalAppearances++;

                let qTerm = parseYearTerm(q.year);
                if (qTerm >= maxTerm - 50) {
                    t.recentAppearances++;
                }

                if (q.type === 'Case Study') {
                    t.caseStudyBonus++;
                }

                if (q.section === 'B') {
                    t.sectionBAppearances++;
                    totalSecBQs++;
                    if (!t.yearsB.includes(q.year)) t.yearsB.push(q.year);
                }
            });

            let topics = Object.values(stats).filter(t => t.sectionBAppearances > 0);

            topics.forEach(t => {
                t.lastSeen = t.yearsB.sort((a,b) => parseYearTerm(b) - parseYearTerm(a))[0];
                t.score = (t.sectionBAppearances * 10) + 
                          (t.totalAppearances * 4) + 
                          (t.recentAppearances * 3) + 
                          (t.caseStudyBonus * 2);
            });

            topics.sort((a,b) => b.score - a.score);

            let runningTotal = 0;
            topics.forEach(t => {
                runningTotal += t.sectionBAppearances;
                let perc = runningTotal / totalSecBQs;
                if (perc <= 0.50) t.category = 'A';
                else if (perc <= 0.85) t.category = 'B';
                else t.category = 'C';
            });

            return topics;
        }

        function parseYearTerm(str) {
            if(!str) return 0;
            const parts = str.split(' ');
            if(parts.length < 2) return parseInt(str) * 100;
            const m = parts[0].toLowerCase().includes('dec') ? 12 : 6;
            return parseInt(parts[1]) * 100 + m;
        }

        function createCard(title, subtitle, onClick, isEnabled = true) {
            const el = document.createElement('div');
            if (isEnabled) {
                el.className = "group bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 hover:shadow-md hover:border-brand-500 cursor-pointer transition-all active:scale-[0.98]";
                el.onclick = onClick;
            } else {
                el.className = "bg-slate-50 dark:bg-slate-800/50 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 opacity-60 cursor-not-allowed";
            }
            el.innerHTML = `
                <h3 class="text-xl font-bold mb-1 text-slate-800 dark:text-slate-100 ${isEnabled ? 'group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors' : ''}">${title}</h3>
                <p class="text-sm font-semibold tracking-wide ${isEnabled ? 'text-slate-500 dark:text-slate-400' : 'text-slate-400'}">${subtitle}</p>
            `;
            return el;
        }

        backBtn.addEventListener('click', () => {
            if (currentState.level > 0) {
                history.back();
            }
        });

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeIcon.innerHTML = isDark 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>`
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
        }

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            updateThemeIcon();
        });

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        titleEl.textContent = "Loading Strategy...";
        container.className = "flex justify-center items-center py-20 fade-in";
        container.innerHTML = `
            <div class="flex flex-col items-center gap-4 text-slate-500 dark:text-slate-400">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-600 dark:border-brand-400"></div>
                <span class="font-medium tracking-wide">Compiling datasets...</span>
            </div>
        `;

        loadData().then(() => {
            history.replaceState(JSON.parse(JSON.stringify(currentState)), "", "");
            render();
        }).catch(() => {});
    </script>
</body>
</html>
