<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMA Final Strategic Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' },
                        accent: { 500: '#8b5cf6', 600: '#7c3aed' }
                    },
                    boxShadow: {
                        'glow': '0 0 15px -3px rgba(139, 92, 246, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; font-size: 0.95rem; }
        th, td { border: 1px solid #cbd5e1; padding: 0.75rem 1rem; text-align: left; }
        th { background-color: #f8fafc; font-weight: 700; color: #0f172a; }
        tr:nth-child(even) { background-color: #f1f5f9; }
        .dark th, .dark td { border-color: #475569; }
        .dark th { background-color: #1e293b; color: #f1f5f9; }
        .dark tr:nth-child(even) { background-color: #0f172a; }
        .dark tr:nth-child(odd) { background-color: transparent; }

        .progress-btn svg { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), color 0.15s ease, fill 0.15s ease; }
        .progress-btn:active svg { transform: scale(0.85); }
        .pop { animation: pop-anim 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop-anim { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
        .filter-btn { transition: all 0.2s ease; }
        .filter-btn.active { background-color: #1e293b; color: white; border-color: #1e293b; }
        .dark .filter-btn.active { background-color: #f1f5f9; color: #0f172a; border-color: #f1f5f9; }

        /* Form Inputs Custom Styling */
        .form-input {
            width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem;
            border: 1px solid #cbd5e1; background-color: #f8fafc; color: #0f172a;
            transition: all 0.2s ease; outline: none;
        }
        .form-input:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
        .dark .form-input {
            border-color: #475569; background-color: #1e293b; color: #f1f5f9;
        }
        .dark .form-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-sans relative overflow-x-hidden">

    <!-- ==================== SPLASH SCREEN ==================== -->
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 transition-opacity duration-500">
        <div class="w-16 h-16 rounded-2xl bg-brand-600 flex items-center justify-center text-white text-2xl font-black shadow-lg mb-6 animate-pulse">
            CMA
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-800 dark:text-slate-100 mb-8">Strategic Preparation</h1>
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600 dark:border-brand-400"></div>
    </div>

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
        <div class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 text-center fade-in">
            <div class="w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center text-white text-lg font-black shadow-md mx-auto mb-6">CMA</div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Welcome Back</h2>
            <p class="text-slate-500 dark:text-slate-400 font-medium mb-8">Sign in to sync your strategic preparation and progress.</p>
            
            <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-white font-bold py-3.5 px-4 rounded-xl shadow-sm hover:shadow hover:bg-slate-50 dark:hover:bg-slate-600 transition-all active:scale-[0.98]">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <!-- ==================== ONBOARDING SCREEN ==================== -->
    <div id="onboarding-screen" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4 overflow-y-auto">
        <div class="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-700 fade-in my-auto">
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">Set Up Your Profile</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">Customize your experience to get the most accurate strategic insights.</p>
            
            <form id="onboarding-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Full Name *</label>
                    <input type="text" id="ob-name" required class="form-input" placeholder="e.g. Bipin Kumar">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Date of Birth *</label>
                    <input type="date" id="ob-dob" required class="form-input">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Target Attempt *</label>
                        <select id="ob-attempt" required class="form-input cursor-pointer">
                            <option value="" disabled selected>Select</option>
                            <!-- Auto-generated by JS -->
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">CMA Level *</label>
                        <select id="ob-cmalevel" required class="form-input cursor-pointer">
                            <option value="" disabled selected>Select</option>
                            <option value="Group 3">Group 3</option>
                            <option value="Group 4">Group 4</option>
                            <option value="Both Groups">Both Groups</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Phone Number *</label>
                    <input type="tel" id="ob-phone" required class="form-input" placeholder="+91 xxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Email <span class="text-slate-400 font-normal">(Optional)</span></label>
                    <input type="email" id="ob-email" class="form-input" placeholder="name@example.com">
                </div>
                
                <div class="pt-4">
                    <button type="submit" id="btn-ob-submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                        Complete Setup
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="main-app" class="hidden flex-col flex-grow w-full">
        <!-- Header -->
        <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-20 transition-colors">
            <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">CMA Strategic Preparation</h1>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="Toggle Dark Mode">
                        <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                    </button>
                    <button id="btn-logout" class="p-2 rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 text-red-500 transition-colors" title="Sign Out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8 relative">
            <div class="mb-8 flex items-center justify-between min-h-[40px]">
                <h2 id="step-title" class="text-3xl font-bold tracking-tight text-slate-800 dark:text-slate-100">Loading...</h2>
                <button id="btn-back" class="hidden px-4 py-2 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 shadow-sm border border-transparent dark:border-slate-700">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back
                </button>
            </div>
            <div id="content-container" class="fade-in"></div>
        </main>

        <!-- Footer -->
        <footer class="mt-auto py-6 text-center text-sm font-medium text-slate-400 dark:text-slate-500 select-none">
            &bull; Keep Studying 📙 &bull; Made By Bipin ❤️
        </footer>
    </div>

    <!-- ==================== LOGIC MODULE ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Local Fallback + Canvas support)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDaClQEX1-si_FvhA930HtuYFgXTUWXxao",
                authDomain: "cma-strategic-prep.firebaseapp.com",
                projectId: "cma-strategic-prep",
                storageBucket: "cma-strategic-prep.firebasestorage.app",
                messagingSenderId: "433153347306",
                appId: "1:433153347306:web:71c7ac4cddc94627261193"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        /* * RECOMMENDED FIRESTORE SECURITY RULES
         * -------------------------------------
         * rules_version = '2';
         * service cloud.firestore {
         * match /databases/{database}/documents {
         * match /users/{userId} {
         * allow read, write: if request.auth != null && request.auth.uid == userId;
         * }
         * }
         * }
         */

        // Screen Elements
        const screens = {
            splash: document.getElementById('splash-screen'),
            login: document.getElementById('login-screen'),
            onboarding: document.getElementById('onboarding-screen'),
            main: document.getElementById('main-app')
        };

        let currentFirebaseUser = null;

        function showScreen(screenKey) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenKey].classList.remove('hidden');
        }

        function populateAttemptDropdown() {
            const select = document.getElementById('ob-attempt');
            select.innerHTML = '<option value="" disabled selected>Select</option>';
            const currentYear = new Date().getFullYear();
            for (let i = 0; i < 3; i++) {
                const yr = currentYear + i;
                select.innerHTML += `<option value="June ${yr}">June ${yr}</option>`;
                select.innerHTML += `<option value="Dec ${yr}">Dec ${yr}</option>`;
            }
        }

        // --- Auth & Routing Logic ---
        setTimeout(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentFirebaseUser = user;
                    try {
                        const userDoc = await getDoc(doc(db, "users", user.uid));
                        if (userDoc.exists()) {
                            showScreen('main');
                            startApp();
                        } else {
                            populateAttemptDropdown();
                            showScreen('onboarding');
                        }
                    } catch (error) {
                        console.error("Firestore error:", error);
                        // Fallback to onboarding if rules deny read or error occurs
                        populateAttemptDropdown();
                        showScreen('onboarding');
                    }
                } else {
                    currentFirebaseUser = null;
                    showScreen('login');
                }
                
                // Fade out splash safely
                if (!screens.splash.classList.contains('hidden')) {
                    screens.splash.classList.add('fade-out');
                    setTimeout(() => screens.splash.classList.add('hidden'), 500);
                }
            });
        }, 1500); // Enforce 1.5s minimal splash duration

        // --- Event Listeners: Auth & Onboarding ---
        document.getElementById('btn-google-login').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Google Sign-In Error:", error);
                alert("Failed to sign in. Please try again.");
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
            window.location.reload();
        });

        document.getElementById('onboarding-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-ob-submit');
            btn.disabled = true;
            btn.innerHTML = `Saving... <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>`;

            const profileData = {
                uid: currentFirebaseUser.uid,
                fullName: document.getElementById('ob-name').value,
                dob: document.getElementById('ob-dob').value,
                attempt: document.getElementById('ob-attempt').value,
                cmaLevel: document.getElementById('ob-cmalevel').value,
                phone: document.getElementById('ob-phone').value,
                email: document.getElementById('ob-email').value || currentFirebaseUser.email,
                createdAt: serverTimestamp()
            };

            try {
                await setDoc(doc(db, "users", currentFirebaseUser.uid), profileData);
                showScreen('main');
                startApp();
            } catch (error) {
                console.error("Error saving profile:", error);
                alert("Could not save profile. Please ensure Firestore is set up correctly.");
                btn.disabled = false;
                btn.innerHTML = `Complete Setup <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>`;
            }
        });

        // ============================================================================
        // MAIN APP LOGIC (From existing monolithic script, bound to window for SPA)
        // ============================================================================
        
        let questionData = [];
        let userProgress = JSON.parse(localStorage.getItem('cma_progress')) || {};
        
        let currentState = {
            level: 0,
            group: null,
            paper: null,
            module: null,
            topic: null,
            year: null,
            filterState: 'ALL'
        };

        const container = document.getElementById('content-container');
        const titleEl = document.getElementById('step-title');
        const backBtn = document.getElementById('btn-back');

        function pushStateAndRender() {
            history.pushState(JSON.parse(JSON.stringify(currentState)), "", "");
            render();
        }

        window.addEventListener('popstate', (event) => {
            if (event.state) {
                currentState = event.state;
                render();
            } else {
                currentState.level = 0;
                render();
            }
        });

        async function loadData() {
            try {
                let fileList = [];
                try {
                    const indexRes = await fetch('data/index.json');
                    if (indexRes.ok) {
                        const indexData = await indexRes.json();
                        fileList = indexData.map(file => `data/${file}`);
                    } else throw new Error('No index');
                } catch (e) {
                    fileList = [
                        "data/paper16_dec2025.json",
                        "data/paper16_june2025.json",
                        "data/paper16_dec2024.json",
                        "data/paper16_june2024.json",
                        "data/paper16_dec2023.json",
                        "data/paper14_dec2023.json",
                        "data/paper14_june2024.json",
                        "data/paper14_dec2024.json",
                        "data/paper14_june2025.json",
                        "data/paper14_dec2025.json",
                        "data/paper13.json"
                    ];
                }

                const fetchPromises = fileList.map(async (file) => {
                    try {
                        const response = await fetch(file);
                        if (!response.ok) return [];
                        return await response.json();
                    } catch (error) {
                        console.warn(`Skipped missing file: ${file}`);
                        return [];
                    }
                });

                const allDatasets = await Promise.all(fetchPromises);
                questionData = allDatasets.flat();

                if (questionData.length === 0) {
                    throw new Error("No data loaded. Check /data/ folder files.");
                }
            } catch (error) {
                renderError(error.message);
                throw error;
            }
        }

        function renderError(msg) {
            titleEl.textContent = "System Error";
            container.className = "fade-in";
            container.innerHTML = `
                <div class="p-6 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 rounded-2xl border border-red-200 dark:border-red-800/50 shadow-sm">
                    <h3 class="font-bold text-lg mb-2">Error Loading Data</h3>
                    <p>${msg}</p>
                    <ul class="list-disc pl-5 mt-4 text-sm opacity-80">
                        <li>Ensure you are running a local server (e.g., VS Code Live Server).</li>
                        <li>Verify the /data/ folder exists.</li>
                    </ul>
                </div>`;
        }

        function render() {
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.classList.add('fade-in');
            container.innerHTML = '';
            backBtn.classList.toggle('hidden', currentState.level === 0);

            switch(currentState.level) {
                case 0: renderGroups(); break;
                case 1: renderPapers(); break;
                case 2: renderDashboard(); break;
                case 3: renderModules(); break;
                case 4: renderTopics(); break;
                case 5: renderYears(); break;
                case 6: renderQuestions(); break;
                case 10: renderABCAnalysis(); break;
                case 11: renderABCTopicQuestions(); break;
            }
        }

        function renderGroups() {
            titleEl.textContent = "Select Group";
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            ["Group 3", "Group 4"].forEach(group => {
                container.appendChild(createCard(group, "View Papers →", () => {
                    currentState.group = group;
                    currentState.level = 1;
                    pushStateAndRender();
                }));
            });
        }

        function renderPapers() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.group} /</span>Papers`;
            container.className = "grid grid-cols-1 sm:grid-cols-2 gap-5";
            
            if (currentState.group === "Group 3") {
                ["Paper 13", "Paper 14", "Paper 15", "Paper 16"].forEach(paper => {
                    container.appendChild(createCard(paper, "Open Dashboard →", () => {
                        currentState.paper = paper;
                        currentState.level = 2;
                        pushStateAndRender();
                    }, true));
                });
            } else {
                container.innerHTML = `<div class="col-span-full p-8 text-center bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm"><p class="text-slate-500">Contents coming soon.</p></div>`;
            }
        }

        function renderDashboard() {
            titleEl.innerHTML = `<span class="text-slate-400 font-medium text-xl mr-2">${currentState.paper} /</span>Dashboard`;
            container.className = "flex flex-col gap-8";

            const paperData = questionData.filter(q => q.paper === currentState.paper);
            const totalQs = paperData.length;
            const uniqueTopics = new Set(paperData.map(q => q.topic)).size;
            const uniqueModules = new Set(paperData.map(q => q.module)).size;

            container.innerHTML = `
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${totalQs}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Questions</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${uniqueTopics}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Topics</div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm text-center">
                        <div class="text-3xl font-black text-brand-600 dark:text-brand-500 mb-1">${uniqueModules}</div>
                        <div class="text-xs font-bold uppercase tracking-wider text-slate-500">Modules</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        function formatQuestionText(text) {
            if (!text) return '';
            if (text.includes('<table')) return `<div class="overflow-x-auto mb-6">${text}</div>`;

            const lines = text.split('\n');
            let htmlOut = '';
            let inTable = false;
            let tableRows = [];

            const escapeHTML = (str) => str.replace(/</g, '&lt;').replace(/>/g, '&gt;');

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.includes('|')) {
                    inTable = true;
                    tableRows.push(escapeHTML(line));
                } else {
                    if (inTable) {
                        htmlOut += convertPipeTableToHTML(tableRows);
                        inTable = false;
                        tableRows = [];
                    }
                    if (line) htmlOut += `<p class="mb-3 whitespace-pre-wrap">${escapeHTML(line)}</p>`;
                }
            }
            if (inTable && tableRows.length > 0) htmlOut += convertPipeTableToHTML(tableRows);
            return htmlOut;
        }

        function convertPipeTableToHTML(rows) {
            if (!rows || rows.length === 0) return '';
            let html = '<div class="overflow-x-auto mb-6"><table class="w-full text-left border-collapse">';
            rows.forEach((row, index) => {
                const isHeader = index === 0;
                const tag = isHeader ? 'th' : 'td';
                let cells = row.split('|');
                if(cells.length > 0 && cells[0].trim() === '') cells.shift();
                if(cells.length > 0 && cells[cells.length-1].trim() === '') cells.pop();
                html += '<tr>';
                cells.forEach(cell => {
                    html += `<${tag} class="border border-slate-300 dark:border-slate-600 px-4 py-3 font-medium align-top">${cell.trim()}</${tag}>`;
                });
                html += '</tr>';
            });
            html += '</table></div>';
            return html;
        }

        function parseYearTerm(str) {
            if(!str) return 0;
            const parts = str.split(' ');
            if(parts.length < 2) return parseInt(str) * 100;
            const m = parts[0].toLowerCase().includes('dec') ? 12 : 6;
            return parseInt(parts[1]) * 100 + m;
        }

        function getProgressIcon(state) {
            if (state === 2) {
                return `<svg class="w-6 h-6 text-emerald-600 dark:text-emerald-500" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>`;
            } else if (state === 1) {
                return `<svg class="w-6 h-6 text-amber-500 dark:text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2 a10 10 0 0 1 10 10 h-10 z" fill="currentColor"></path></svg>`;
            } else {
                return `<svg class="w-6 h-6 text-slate-300 dark:text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg>`;
            }
        }

        window.cycleProgress = function(qId, btn, event) {
            event.stopPropagation();
            let current = userProgress[qId]?.state || 0;
            let next = (current + 1) % 3;
            userProgress[qId] = { state: next, updated: Date.now() };
            localStorage.setItem('cma_progress', JSON.stringify(userProgress));
            
            btn.innerHTML = getProgressIcon(next);
            const svg = btn.querySelector('svg');
            svg.classList.remove('pop');
            void svg.offsetWidth; 
            svg.classList.add('pop');
        }

        window.setFilter = function(id) {
            currentState.filterState = (id === 'ALL') ? 'ALL' : parseInt(id);
            render();
        }

        function getTopicProgress(paper, topic) {
            const secBQs = questionData.filter(q => q.paper === paper && q.topic === topic && q.section === 'B');
            const total = secBQs.length;
            if (total === 0) return null;
            let mastered = 0;
            let practiced = 0;
            secBQs.forEach(q => {
                const qId = `${q.paper}_${q.year}_${q.question_no}`;
                const state = userProgress[qId]?.state || 0;
                if (state === 2) mastered++;
                else if (state === 1) practiced++;
            });
            return { total, mastered, practiced, percent: Math.round((mastered / total) * 100) || 0 };
        }

            filterBar.innerHTML = filters.map(f => `

                    const qId = `${q.paper}_${q.year}_${q.question_no}`;
                    const state = userProgress[qId]?.state || 0;
                    return state === currentState.filterState;
                });
            }

            if (finalData.length === 0) {
                const msg = document.createElement('div');
                msg.className = "p-6 text-center text-slate-500 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm";
                msg.textContent = "No descriptive questions found for the selected filter.";
                container.appendChild(msg);
                return;
            }

            finalData.forEach(q => {
                const qId = `${q.paper}_${q.year}_${q.question_no}`;
                const progressState = userProgress[qId]?.state || 0;

                const qCard = document.createElement('div');
                qCard.className = "bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden";
                const badgeColor = q.type === 'Practical' ? 'bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300 border-blue-200 dark:border-blue-800' 
                                 : q.type === 'Case Study' ? 'bg-purple-100 text-purple-800 dark:bg-purple-900/40 dark:text-purple-300 border-purple-200 dark:border-purple-800'
                                 : 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800';
                
                qCard.innerHTML = `
                    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="font-black tracking-wide text-brand-600 dark:text-brand-400">${q.year}</span>
                            <span class="font-bold text-slate-800 dark:text-slate-200 text-sm px-2.5 py-1 bg-white dark:bg-slate-700 rounded shadow-sm border border-slate-200 dark:border-slate-600">${q.question_no}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="px-3 py-1 rounded-md text-xs font-bold border ${badgeColor}">${q.type}</span>
                            <button onclick="window.cycleProgress('${qId}', this, event)" class="progress-btn focus:outline-none" aria-label="Toggle Progress" title="Track Progress">
                                ${getProgressIcon(progressState)}
                            </button>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="text-slate-800 dark:text-slate-200 text-lg leading-relaxed">
                            ${formatQuestionText(q.question)}
                        </div>
                    </div>
                `;
                container.appendChild(qCard);
            });
        }

        function calculateABC(data) {
            const stats = {};
            let totalSecBQs = 0;
            const maxTerm = Math.max(...data.map(q => parseYearTerm(q.year)));

            data.forEach(q => {
                if (!stats[q.topic]) {
                    stats[q.topic] = { 
                        name: q.topic, 
                        module: q.module,
                        totalAppearances: 0, 
                        sectionBAppearances: 0,
                        recentAppearances: 0, 
                        caseStudyBonus: 0, 
                        yearsB: [] 
                    };
                }
                let t = stats[q.topic];
                
                t.totalAppearances++;

                let qTerm = parseYearTerm(q.year);
                if (qTerm >= maxTerm - 50) {
                    t.recentAppearances++;
                }

                if (q.type === 'Case Study') {
                    t.caseStudyBonus++;
                }

                if (q.section === 'B') {
                    t.sectionBAppearances++;
                    totalSecBQs++;
                    if (!t.yearsB.includes(q.year)) t.yearsB.push(q.year);
                }
            });

            let topics = Object.values(stats).filter(t => t.sectionBAppearances > 0);

            topics.forEach(t => {
                t.lastSeen = t.yearsB.sort((a,b) => parseYearTerm(b) - parseYearTerm(a))[0];
                t.score = (t.sectionBAppearances * 10) + 
                          (t.totalAppearances * 4) + 
                          (t.recentAppearances * 3) + 
                          (t.caseStudyBonus * 2);
            });

            topics.sort((a,b) => b.score - a.score);

            let runningTotal = 0;
            topics.forEach(t => {
                runningTotal += t.sectionBAppearances;
                let perc = runningTotal / totalSecBQs;
                if (perc <= 0.50) t.category = 'A';
                else if (perc <= 0.85) t.category = 'B';
                else t.category = 'C';
            });

            return topics;
        }

        backBtn.addEventListener('click', () => {
            if (currentState.level > 0) {
                history.back();
            }
        });

        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            const themeBtnIcon = document.getElementById('theme-icon');
            if(themeBtnIcon) {
                themeBtnIcon.innerHTML = isDark 
                    ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>`
                    : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            }
        }

        document.querySelectorAll('#theme-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                updateThemeIcon();
            });
        });

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        window.startApp = function() {
            titleEl.textContent = "Loading Strategy...";
            container.className = "flex justify-center items-center py-20 fade-in";
            container.innerHTML = `
                <div class="flex flex-col items-center gap-4 text-slate-500 dark:text-slate-400">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-600 dark:border-brand-400"></div>
                    <span class="font-medium tracking-wide">Compiling datasets...</span>
                </div>
            `;

            loadData().then(() => {
                history.replaceState(JSON.parse(JSON.stringify(currentState)), "", "");
                render();
            }).catch(() => {});
        };

    </script>
</body>
